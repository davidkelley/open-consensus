name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: build · typecheck · lint · test · e2e · pack
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test # vitest, per-package >=90% coverage gate (no real CLIs, no spend)
      - run: npm run test:e2e # mock-stack MCP -> daemon -> engine (no spend)
      - run: npm run smoke:pack # pack the npm tarballs + install into a clean prefix

  binary:
    name: build + smoke the single binary (linux-x64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      # pkg downloads the Node base binary once per (target, node) — cache it,
      # keyed by the lockfile so a dep/pkg bump invalidates a stale entry.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pkg-cache
          key: pkg-cache-x86_64-unknown-linux-gnu-node22-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - run: npm run build:binary -- --target x86_64-unknown-linux-gnu
      - run: npm run smoke:binary # daemon start/status/stop (native SQLite) + mcp-server + mcp install
